<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Galaxy Space</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    cursor:grab;
}

canvas{
    display:block;
}

.info{
    position:fixed;
    top:15px;
    left:15px;
    color:white;
    font-family:Arial;
    font-size:14px;
    opacity:.7;
    z-index:10;
    user-select:none;
    letter-spacing:1px;
}

</style>
</head>

<body>

<div class="info">
3D SPACE • Scroll Zoom • Drag Rotate
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene();

scene.fog = new THREE.FogExp2(
0x000000,
0.0009
);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
);

camera.position.z = 300;

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setPixelRatio(
window.devicePixelRatio
);

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);



// ===== PARTICLES =====

const particlesCount = 25000;

const positions =
new Float32Array(
particlesCount * 3
);

const colors =
new Float32Array(
particlesCount * 3
);

for(let i=0;i<particlesCount;i++){

const i3 = i * 3;

const radius =
Math.random() * 1200;

const branchAngle =
(Math.random() * Math.PI * 2);

const randomX =
(Math.random()-0.5) * 60;

const randomY =
(Math.random()-0.5) * 60;

const randomZ =
(Math.random()-0.5) * 60;

positions[i3] =
Math.cos(branchAngle)
* radius + randomX;

positions[i3+1] =
randomY;

positions[i3+2] =
Math.sin(branchAngle)
* radius + randomZ;



// White shades

const shade =
0.7 + Math.random()*0.3;

colors[i3] = shade;
colors[i3+1] = shade;
colors[i3+2] = shade;

}

const geometry =
new THREE.BufferGeometry();

geometry.setAttribute(
'position',
new THREE.BufferAttribute(
positions,
3
)
);

geometry.setAttribute(
'color',
new THREE.BufferAttribute(
colors,
3
)
);

const material =
new THREE.PointsMaterial({

size:2,

vertexColors:true,

transparent:true,

opacity:0.95,

blending:
THREE.AdditiveBlending,

depthWrite:false

});

const galaxy =
new THREE.Points(
geometry,
material
);

scene.add(galaxy);



// ===== MOUSE ROTATE =====

let isDragging = false;

document.addEventListener(
'mousedown',
()=>{
isDragging = true;
document.body.style.cursor = 'grabbing';
}
);

document.addEventListener(
'mouseup',
()=>{
isDragging = false;
document.body.style.cursor = 'grab';
}
);

document.addEventListener(
'mousemove',
(e)=>{

if(isDragging){

galaxy.rotation.y +=
e.movementX * 0.003;

galaxy.rotation.x +=
e.movementY * 0.003;

}

}
);



// ===== ZOOM =====

window.addEventListener(
'wheel',
(e)=>{

camera.position.z +=
e.deltaY * 0.15;

if(camera.position.z < 80)
camera.position.z = 80;

if(camera.position.z > 1200)
camera.position.z = 1200;

}
);



// ===== ANIMATION =====

function animate(){

requestAnimationFrame(
animate
);

galaxy.rotation.y += 0.0006;

renderer.render(
scene,
camera
);

}

animate();



// ===== RESIZE =====

window.addEventListener(
'resize',
()=>{

camera.aspect =
window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>

</body>
</html>
